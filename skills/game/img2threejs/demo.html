<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="img2threejs 多示例 WebGL 批量测试台。">
  <title>img2threejs · Demo Lab</title>
  <style>
    :root { color-scheme: dark; --bg:#050b18; --panel:#0a1729; --line:rgba(104,224,255,.24); --text:#eff8ff; --muted:#9ab2ca; --cyan:#68e0ff; --gold:#f2b85b; --green:#78e5a4; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--text); font:15px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,sans-serif; background:radial-gradient(circle at 15% 0,rgba(20,87,140,.28),transparent 35rem),var(--bg); }
    .shell { width:min(1480px,calc(100% - 36px)); margin:0 auto; padding:28px 0 38px; }
    nav,.title-row,.card-head,.toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .brand { color:var(--text); font-weight:780; letter-spacing:.02em; text-decoration:none; } .brand span { color:var(--cyan); }
    nav a { color:var(--muted); text-decoration:none; font-size:14px; }
    .eyebrow { margin-top:44px; color:var(--gold); font-weight:760; font-size:12px; letter-spacing:.13em; text-transform:uppercase; }
    h1 { margin:7px 0 8px; font-size:clamp(32px,5vw,58px); letter-spacing:-.05em; line-height:1; }
    .lead { margin:0; color:var(--muted); font-size:17px; }
    .toolbar { margin:27px 0 17px; flex-wrap:wrap; justify-content:flex-start; }
    button { border:1px solid var(--line); border-radius:999px; padding:10px 14px; background:rgba(14,46,77,.82); color:var(--text); font:inherit; font-weight:700; cursor:pointer; }
    button:hover { background:rgba(27,87,135,.92); }
    .summary { margin-left:auto; color:var(--muted); font-size:13px; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
    .card { overflow:hidden; border:1px solid var(--line); border-radius:18px; background:var(--panel); box-shadow:0 18px 60px rgba(0,0,0,.24); }
    .card-head { padding:14px 16px; border-bottom:1px solid var(--line); }
    .card h2 { margin:0; font-size:17px; }
    .meta { margin:2px 0 0; color:var(--muted); font-size:12px; }
    .status { color:#ffc96e; font-size:12px; font-weight:760; letter-spacing:.07em; }
    .status.ready { color:var(--green); }
    iframe { display:block; width:100%; aspect-ratio:16/10; border:0; background:#050b18; }
    .foot { margin-top:18px; color:var(--muted); font-size:13px; }
    @media(max-width:850px){.grid{grid-template-columns:1fr}.summary{margin-left:0}.eyebrow{margin-top:28px}}
  </style>
</head>
<body>
  <main class="shell">
    <nav><a class="brand" href="index.html"><span>◆</span> img2threejs</a><a href="README.md">README</a></nav>
    <div class="eyebrow">batch WebGL verification</div>
    <div class="title-row"><div><h1>Demo Lab</h1><p class="lead">同时加载多个程序化资产，集中检查模型渲染、动作状态和浏览器 WebGL 兼容性。</p></div></div>
    <div class="toolbar">
      <button id="reload">重新加载全部</button>
      <button id="chest">切换宝箱开合</button>
      <button id="engine">切换摩托引擎</button>
      <button id="spin">暂停 / 恢复全部自转</button>
      <span class="summary" id="summary">0 / 2 示例就绪</span>
    </div>
    <section class="grid">
      <article class="card">
        <header class="card-head"><div><h2>Procedural Loot Chest</h2><p class="meta">材质、lid pivot、发光锁芯</p></div><span class="status" id="chest-status">● LOADING</span></header>
        <iframe id="chest-frame" title="程序化宝箱 WebGL Demo" src="demos/chest.html"></iframe>
      </article>
      <article class="card" id="bike">
        <header class="card-head"><div><h2>Ares RB-08</h2><p class="meta">附件参考图的风格化摩托重建</p></div><span class="status" id="bike-status">● LOADING</span></header>
        <iframe id="bike-frame" title="Ares RB-08 摩托车 WebGL Demo" src="demos/bike.html"></iframe>
      </article>
    </section>
    <p class="foot">批量入口仅汇总测试；每个模型仍可在卡片内独立旋转与缩放。摩托的隐藏面和底部属于单张参考图下的风格化推断。</p>
  </main>
  <script>
    const examples = {
      chest: document.querySelector('#chest-frame'),
      bike: document.querySelector('#bike-frame'),
    };
    const ready = new Set();
    const updateSummary = () => document.querySelector('#summary').textContent = `${ready.size} / 2 示例就绪`;
    const send = (name, action) => examples[name].contentWindow.postMessage({ action }, location.origin);
    addEventListener('message', (event) => {
      if (event.origin !== location.origin || event.data?.type !== 'img2threejs-ready') return;
      const name = event.data.example;
      if (!examples[name]) return;
      ready.add(name);
      const status = document.querySelector(`#${name}-status`);
      status.textContent = '● WEBGL READY'; status.classList.add('ready'); updateSummary();
    });
    document.querySelector('#reload').addEventListener('click', () => {
      ready.clear(); updateSummary();
      for (const [name, frame] of Object.entries(examples)) {
        const status = document.querySelector(`#${name}-status`);
        status.textContent = '● LOADING'; status.classList.remove('ready'); frame.src = frame.src;
      }
    });
    document.querySelector('#chest').addEventListener('click', () => send('chest', 'chest-toggle'));
    document.querySelector('#engine').addEventListener('click', () => send('bike', 'bike-engine'));
    document.querySelector('#spin').addEventListener('click', () => { send('chest', 'spin-toggle'); send('bike', 'spin-toggle'); });
  </script>
</body>
</html>
