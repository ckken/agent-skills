<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="img2threejs 交互式多示例 WebGL 测试台。">
  <title>img2threejs · Demo Lab</title>
  <style>
    :root { color-scheme:dark; --bg:#050b18; --panel:#0a1729; --line:rgba(104,224,255,.24); --text:#eff8ff; --muted:#9ab2ca; --cyan:#68e0ff; --gold:#f2b85b; --green:#78e5a4; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--text); font:15px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,sans-serif; background:radial-gradient(circle at 12% 0,rgba(20,87,140,.3),transparent 34rem),var(--bg); }
    .shell { width:min(1440px,calc(100% - 36px)); margin:0 auto; padding:28px 0 38px; }
    nav,.hero,.viewer-head,.toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .brand { color:var(--text); font-weight:780; letter-spacing:.02em; text-decoration:none; }.brand span{color:var(--cyan)}nav a{color:var(--muted);text-decoration:none;font-size:14px}
    .eyebrow { margin-top:42px; color:var(--gold); font-size:12px; font-weight:760; letter-spacing:.13em; text-transform:uppercase; }
    h1 { margin:7px 0 8px; font-size:clamp(32px,5vw,58px); line-height:1; letter-spacing:-.05em; }.lead{margin:0;color:var(--muted);font-size:17px}
    .layout { display:grid; grid-template-columns:278px minmax(0,1fr); gap:20px; margin-top:28px; align-items:start; }
    .library,.viewer { border:1px solid var(--line); border-radius:18px; background:rgba(10,23,41,.88); box-shadow:0 18px 60px rgba(0,0,0,.22); }
    .library { padding:13px; }.library h2{margin:3px 4px 11px;font-size:15px}.library p{margin:0 4px 12px;color:var(--muted);font-size:12px}
    .thumb { width:100%; overflow:hidden; display:grid; grid-template-columns:94px 1fr; gap:11px; align-items:center; padding:8px; border:1px solid transparent; border-radius:13px; background:transparent; color:var(--text); text-align:left; font:inherit; cursor:pointer; }
    .thumb + .thumb { margin-top:8px; }.thumb:hover{background:rgba(22,67,106,.46)}.thumb.active{border-color:rgba(104,224,255,.62);background:rgba(18,62,102,.6)}
    .thumb img{width:94px;height:62px;object-fit:cover;border-radius:8px;background:#050b18}.thumb strong{display:block;font-size:14px}.thumb span{display:block;color:var(--muted);font-size:11px;line-height:1.35;margin-top:3px}.thumb .ready{color:var(--green);font-weight:760;letter-spacing:.06em}
    .viewer { overflow:hidden; }.viewer-head{padding:15px 17px;border-bottom:1px solid var(--line)}.viewer h2{margin:0;font-size:19px}.viewer p{margin:3px 0 0;color:var(--muted);font-size:12px}.status{color:#ffc96e;font-size:12px;font-weight:760;letter-spacing:.07em}.status.ready{color:var(--green)}
    iframe { display:block; width:100%; aspect-ratio:16/9; border:0; background:#050b18; }.toolbar{padding:13px 17px;border-top:1px solid var(--line);justify-content:flex-start;flex-wrap:wrap}
    button { border:1px solid var(--line); border-radius:999px; padding:9px 13px; background:rgba(14,46,77,.82); color:var(--text); font:inherit; font-size:13px; font-weight:700; cursor:pointer; }button:hover{background:rgba(27,87,135,.92)}.toolbar .summary{margin-left:auto;color:var(--muted);font-size:12px}
    .foot { margin:18px 2px 0;color:var(--muted);font-size:13px } @media(max-width:840px){.layout{grid-template-columns:1fr}.library{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.library h2,.library p{grid-column:1/-1}.thumb+.thumb{margin-top:0}.thumb{grid-template-columns:82px 1fr}.thumb img{width:82px;height:55px}.eyebrow{margin-top:28px}}@media(max-width:520px){.library{grid-template-columns:1fr}.toolbar .summary{width:100%;margin:0}}
  </style>
</head>
<body>
  <main class="shell">
    <nav><a class="brand" href="index.html"><span>◆</span> img2threejs</a><a href="README.md">README</a></nav>
    <div class="eyebrow">interactive model gallery</div>
    <section class="hero"><div><h1>Demo Lab</h1><p class="lead">选择缩略图加载模型；主预览一次只运行一个 WebGL 实例，方便逐个检查渲染和动作状态。</p></div></section>
    <section class="layout">
      <aside class="library" aria-label="示例模型列表">
        <h2>示例模型</h2><p>点击缩略图切换主预览。</p>
        <button class="thumb active" data-example="chest"><img src="assets/thumbnails/chest.webp" alt="程序化宝箱缩略图"><span><strong>Procedural Loot Chest</strong><span>材质、lid pivot、发光锁芯</span><span class="ready" id="chest-ready">待加载</span></span></button>
        <button class="thumb" data-example="bike"><img src="assets/thumbnails/bike.webp" alt="Ares RB-08 摩托车缩略图"><span><strong>Ares RB-08</strong><span>附件参考图的风格化重建</span><span class="ready" id="bike-ready">待加载</span></span></button>
      </aside>
      <section class="viewer">
        <header class="viewer-head"><div><h2 id="model-title">Procedural Loot Chest</h2><p id="model-meta">材质、lid pivot、发光锁芯</p></div><span class="status" id="status">● LOADING</span></header>
        <iframe id="preview" title="img2threejs 模型主预览" src="demos/chest.html"></iframe>
        <div class="toolbar"><button id="reload">重新加载当前模型</button><button id="action">切换宝箱开合</button><button id="spin">暂停 / 恢复自转</button><span class="summary" id="summary">已验证 0 / 2 个模型</span></div>
      </section>
    </section>
    <p class="foot">模型可在主预览内拖动旋转、滚轮缩放。摩托的隐藏面、底部与机械连接属于单张参考图下的风格化推断。</p>
  </main>
  <script>
    const catalog = {
      chest: { title:'Procedural Loot Chest', meta:'材质、lid pivot、发光锁芯', src:'demos/chest.html', action:'切换宝箱开合', command:'chest-toggle' },
      bike: { title:'Ares RB-08', meta:'附件参考图的风格化摩托重建', src:'demos/bike.html', action:'切换摩托引擎', command:'bike-engine' },
    };
    const frame = document.querySelector('#preview'); const verified = new Set(); let active = new URLSearchParams(location.search).get('model') === 'bike' ? 'bike' : 'chest';
    const refreshSummary = () => document.querySelector('#summary').textContent = `已验证 ${verified.size} / 2 个模型`;
    const updateThumbs = () => document.querySelectorAll('.thumb').forEach(button => button.classList.toggle('active', button.dataset.example === active));
    function load(name) {
      active = name; const entry = catalog[name]; history.replaceState(null, '', `${location.pathname}?model=${name}`);
      document.querySelector('#model-title').textContent = entry.title; document.querySelector('#model-meta').textContent = entry.meta; document.querySelector('#action').textContent = entry.action;
      const status = document.querySelector('#status'); status.textContent = '● LOADING'; status.classList.remove('ready');
      document.querySelector(`#${name}-ready`).textContent = '加载中'; frame.src = `${entry.src}?instance=${Date.now()}`; updateThumbs();
    }
    function send(action) { frame.contentWindow.postMessage({ action }, location.origin); }
    document.querySelectorAll('.thumb').forEach(button => button.addEventListener('click', () => load(button.dataset.example)));
    document.querySelector('#reload').addEventListener('click', () => load(active));
    document.querySelector('#action').addEventListener('click', () => send(catalog[active].command));
    document.querySelector('#spin').addEventListener('click', () => send('spin-toggle'));
    addEventListener('message', event => {
      if (event.origin !== location.origin || event.data?.type !== 'img2threejs-ready' || event.data.example !== active) return;
      verified.add(active); document.querySelector('#status').textContent = '● WEBGL READY'; document.querySelector('#status').classList.add('ready');
      document.querySelector(`#${active}-ready`).textContent = 'WEBGL READY'; refreshSummary();
    });
    load(active);
  </script>
</body>
</html>
