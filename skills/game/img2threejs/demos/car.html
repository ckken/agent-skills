    @media(max-width:720px){.top,.bottom{flex-direction:column}.note,.hint{width:auto;text-align:left}.controls{max-width:100%}.reference{width:67vw;right:12px}.hint{display:none}}

  </script>
  <script type="module">
    import * as THREE from '../assets/vendor/three.module.min.js';

    const canvas=document.querySelector('#scene');
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false,powerPreference:'high-performance'});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.outputColorSpace=THREE.SRGBColorSpace;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=.94;
    const backend='WEBGL';stateLabel.textContent=`● ${backend} READY`;if(window.parent!==window)window.parent.postMessage({type:'img2threejs-ready',example:'car',backend},'*');

    const scene=new THREE.Scene();scene.background=new THREE.Color(0xd7d7d7);scene.fog=new THREE.Fog(0xd7d7d7,19,34);
    const camera=new THREE.PerspectiveCamera(33,1,.1,100);
    scene.add(new THREE.HemisphereLight(0xf6f8fb,0x56504b,1.5));
    const key=new THREE.DirectionalLight(0xfff6e8,4.0);key.position.set(-6,10,8);key.castShadow=true;key.shadow.mapSize.set(2048,2048);key.shadow.camera.left=-7;key.shadow.camera.right=7;key.shadow.camera.top=6;key.shadow.camera.bottom=-5;key.shadow.bias=-.00015;scene.add(key);
    const fill=new THREE.DirectionalLight(0xc5d8f0,1.55);fill.position.set(7,5,5);scene.add(fill);
    const rim=new THREE.DirectionalLight(0xffffff,2.25);rim.position.set(3,8,-9);scene.add(rim);
    const floor=new THREE.Mesh(new THREE.PlaneGeometry(42,30),new THREE.ShadowMaterial({color:0x171717,opacity:.24}));floor.rotation.x=-Math.PI/2;floor.position.y=-.005;floor.receiveShadow=true;scene.add(floor);

    function textureCanvas(draw,size=512,colorSpace=false){const canvas=document.createElement('canvas');canvas.width=canvas.height=size;const context=canvas.getContext('2d');draw(context,size);const texture=new THREE.CanvasTexture(canvas);texture.wrapS=texture.wrapT=THREE.RepeatWrapping;if(colorSpace)texture.colorSpace=THREE.SRGBColorSpace;texture.anisotropy=Math.min(8,renderer.capabilities.getMaxAnisotropy());return texture}
    const paintRough=textureCanvas((x,s)=>{x.fillStyle='#b8b8b8';x.fillRect(0,0,s,s);for(let i=0;i<1800;i++){const v=165+((i*37)%35);x.fillStyle=`rgb(${v},${v},${v})`;const px=(i*73)%s,py=(i*151)%s;x.fillRect(px,py,1+(i%2),1+(i%2));}});paintRough.repeat.set(3,3);
    const carbonMap=textureCanvas((x,s)=>{x.fillStyle='#101114';x.fillRect(0,0,s,s);for(let y=0;y<s;y+=8)for(let q=0;q<s;q+=8){x.fillStyle=((q+y)/8)%2?'#24272b':'#090a0c';x.save();x.translate(q+4,y+4);x.rotate(-.65);x.fillRect(-6,-1.5,12,3);x.restore();}},512,true);carbonMap.repeat.set(9,5);
    const carbonBump=textureCanvas((x,s)=>{x.fillStyle='#777';x.fillRect(0,0,s,s);x.strokeStyle='#a9a9a9';x.lineWidth=2;for(let i=-s;i<s*2;i+=8){x.beginPath();x.moveTo(i,0);x.lineTo(i-s,s);x.stroke();x.beginPath();x.moveTo(i,0);x.lineTo(i+s,s);x.stroke();}});carbonBump.repeat.copy(carbonMap.repeat);
    const rubberBump=textureCanvas((x,s)=>{x.fillStyle='#777';x.fillRect(0,0,s,s);x.strokeStyle='#999';x.lineWidth=3;for(let y=0;y<s;y+=14){x.beginPath();x.moveTo(0,y);x.lineTo(s,y+8);x.stroke();}});rubberBump.repeat.set(3,12);

    const yellow=new THREE.MeshPhysicalMaterial({color:0xe9aa05,roughness:.24,roughnessMap:paintRough,metalness:.26,clearcoat:1,clearcoatRoughness:.1});

    const carbon=new THREE.MeshPhysicalMaterial({color:0x111216,map:carbonMap,bumpMap:carbonBump,bumpScale:.025,roughness:.29,metalness:.55,clearcoat:.38,clearcoatRoughness:.2});

    const glass=new THREE.MeshPhysicalMaterial({color:0x111820,roughness:.13,metalness:.18,transparent:true,opacity:.9,transmission:.08,clearcoat:1,clearcoatRoughness:.08,side:THREE.DoubleSide});
    const wheelMetal=new THREE.MeshStandardMaterial({color:0x101216,roughness:.25,metalness:.86});
    const rotorMetal=new THREE.MeshStandardMaterial({color:0x7f8388,roughness:.34,metalness:.94});

    const brakeYellow=new THREE.MeshPhysicalMaterial({color:0xf5b900,roughness:.25,metalness:.46,clearcoat:.8});
    const whiteLED=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:4.2,roughness:.12});
    const redLED=new THREE.MeshStandardMaterial({color:0xff2024,emissive:0xff0710,emissiveIntensity:4.0,roughness:.14});
    const redDark=new THREE.MeshStandardMaterial({color:0x350205,emissive:0x180001,emissiveIntensity:.25,roughness:.28});

    const car=new THREE.Group();car.position.y=.02;scene.add(car);
    const add=(parent,geometry,material,position=[0,0,0],rotation=[0,0,0],scale=[1,1,1])=>{const mesh=new THREE.Mesh(geometry,material);mesh.position.set(...position);mesh.rotation.set(...rotation);mesh.scale.set(...scale);mesh.castShadow=true;mesh.receiveShadow=true;parent.add(mesh);return mesh};

    function panel(parent,points,depth,material,z,rotation=[0,0,0]){const shape=new THREE.Shape();shape.moveTo(...points[0]);for(const point of points.slice(1))shape.lineTo(...point);shape.closePath();const geometry=new THREE.ExtrudeGeometry(shape,{depth,bevelEnabled:true,bevelSize:Math.min(.025,depth*.4),bevelThickness:Math.min(.02,depth*.3),bevelSegments:2});geometry.translate(0,0,-depth/2);return add(parent,geometry,material,[0,0,z],rotation)}
    function loft(sections,material){const ringCount=12,vertices=[],uv=[],indices=[];for(let i=0;i<sections.length;i++){const s=sections[i],ring=[[0,s.center],[.55*s.w,s.shoulder],[.9*s.w,s.side+.09],[s.w,s.side],[s.w,s.lower+.18],[.68*s.w,s.lower],[0,s.lower-.035],[-.68*s.w,s.lower],[-s.w,s.lower+.18],[-s.w,s.side],[-.9*s.w,s.side+.09],[-.55*s.w,s.shoulder]];for(let j=0;j<ringCount;j++){vertices.push(s.x,ring[j][1],ring[j][0]);uv.push(i/(sections.length-1),j/(ringCount-1));}}for(let i=0;i<sections.length-1;i++)for(let j=0;j<ringCount;j++){const a=i*ringCount+j,b=i*ringCount+(j+1)%ringCount,c=(i+1)*ringCount+(j+1)%ringCount,d=(i+1)*ringCount+j;indices.push(a,b,d,b,c,d)}for(const end of [0,sections.length-1]){const centerIndex=vertices.length/3,s=sections[end];vertices.push(s.x,(s.center+s.lower)/2,0);uv.push(.5,.5);for(let j=0;j<ringCount;j++){const a=end*ringCount+j,b=end*ringCount+(j+1)%ringCount;if(end===0)indices.push(centerIndex,b,a);else indices.push(centerIndex,a,b)}}const geometry=new THREE.BufferGeometry();geometry.setAttribute('position',new THREE.Float32BufferAttribute(vertices,3));geometry.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));geometry.setIndex(indices);geometry.computeVertexNormals();return add(car,geometry,material)}

      {x:-3.18,w:.68,lower:.25,side:.41,shoulder:.59,center:.64},{x:-2.82,w:1.08,lower:.2,side:.47,shoulder:.71,center:.78},{x:-2.2,w:1.2,lower:.21,side:.6,shoulder:.87,center:.95},{x:-1.52,w:1.14,lower:.23,side:.66,shoulder:.91,center:1.01},{x:-.72,w:1.08,lower:.25,side:.69,shoulder:.94,center:1.02},{x:.52,w:1.07,lower:.25,side:.7,shoulder:.97,center:1.04},{x:1.55,w:1.2,lower:.22,side:.66,shoulder:.98,center:1.08},{x:2.38,w:1.15,lower:.21,side:.58,shoulder:.86,center:.93},{x:2.9,w:1.02,lower:.24,side:.48,shoulder:.68,center:.72}

    ],yellow);

      panel(car,[[-1.25,.99],[-.85,1.5],[-.2,1.53],[-.27,1.01]],.025,glass,side*.84);
      panel(car,[[-.17,1.52],[.4,1.55],[1.17,1.3],[1.22,1],[-.17,1.01]],.025,glass,side*.82);
      tube(car,[[-1.36,.95,side*.74],[-.89,1.58,side*.82],[-.25,1.61,side*.85]],.03,yellowSatin,20);
      tube(car,[[-.2,1.01,side*.85],[-.18,1.56,side*.85]],.03,blackPaint,12);

    add(car,new THREE.SphereGeometry(1,44,24),yellow,[-1.72,.94,-.59],[0,0,-.06],[.72,.085,.3]);
    box(car,[.76,.014,.27],carbon,[-2.76,.77,0],[0,0,-.14]);

    for(const side of [-1,1]){
      add(car,new THREE.SphereGeometry(1,28,14),dark,[-1.65,1.11,side*.61],[0,0,0],[.42,.025,.2]);
      cyl(car,.055,.025,dark,[-2.28,1.13,side*.79],[0,0,0],24);

    function makeWheel(x,z){const wheel=new THREE.Group();wheel.position.set(x,.54,z);car.add(wheel);add(wheel,new THREE.TorusGeometry(.44,.1,20,72),rubber);cyl(wheel,.35,.15,wheelMetal,[0,0,0]);cyl(wheel,.285,.026,rotorMetal,[0,0,z>0?.09:-.09]);cyl(wheel,.09,.18,dark,[0,0,0]);for(let i=0;i<16;i++){const angle=i*Math.PI/8;const spoke=box(wheel,[.29,.03,.05],wheelMetal,[Math.cos(angle)*.145,Math.sin(angle)*.145,z>0?.095:-.095],[0,0,angle]);spoke.scale.y=1+(i%2)*.2}for(let i=0;i<12;i++){const angle=i*Math.PI/6;cyl(wheel,.014,.012,dark,[Math.cos(angle)*.23,Math.sin(angle)*.23,z>0?.11:-.11]);}box(wheel,[.085,.23,.08],brakeYellow,[.22,.01,z>0?.105:-.105],[0,0,.08]);cyl(wheel,.055,.2,wheelMetal,[0,0,0]);wheels.push(wheel);return wheel}

    for(let x=-2.25;x<=2.3;x+=.45)for(const z of [-.84,.84])cyl(car,.018,.014,wheelMetal,[x,.205,z],[0,0,0],12);

    // View-dependent image reconstruction: exact supplied pixels at nine evidence-backed views,

    const proxyDefinitions={
      'front-left':{src:'../assets/impostors/apex-gt-r-front-left.webp',width:6.8},'front-right':{src:'../assets/impostors/apex-gt-r-front-right.webp',width:6.8},

    const proxyMaterial=new THREE.SpriteMaterial({transparent:true,depthTest:false,depthWrite:false,toneMapped:false});
    const proxy=new THREE.Sprite(proxyMaterial);proxy.center.set(.5,0);proxy.renderOrder=100;proxy.visible=false;scene.add(proxy);
    const proxyTextures={},textureLoader=new THREE.TextureLoader();
    for(const [id,definition] of Object.entries(proxyDefinitions))textureLoader.load(definition.src,texture=>{texture.colorSpace=THREE.SRGBColorSpace;texture.anisotropy=Math.min(8,renderer.capabilities.getMaxAnisotropy());proxyTextures[id]=texture;syncProjection()});

    const runtime={yaw:-.72,pitch:.1,distance:9.5,spin:false,lights:true,projection:true,target:new THREE.Vector3(-.05,.78,0)};car.userData.sculptRuntime=runtime;
    const views={hero:{yaw:-.72,pitch:.1,distance:9.5},front:{yaw:-Math.PI/2,pitch:.025,distance:10.2},side:{yaw:0,pitch:.025,distance:9.6},rear:{yaw:Math.PI/2,pitch:.035,distance:10.2},top:{yaw:-Math.PI/2,pitch:.92,distance:11.2}};
    function proxyView(){if(runtime.pitch>.62)return'top';const dx=Math.sin(runtime.yaw),dz=Math.cos(runtime.yaw);if(Math.abs(dx)>.91)return dx<0?'front':'rear';if(Math.abs(dz)>.92)return dz>0?'side-left':'side-right';if(dx<0)return dz>0?'front-left':'front-right';return dz>0?'rear-left':'rear-right'}
    function syncProjection(){car.visible=!runtime.projection;proxy.visible=runtime.projection;const id=proxyView(),texture=proxyTextures[id];if(!runtime.projection||!texture)return;const definition=proxyDefinitions[id],aspect=texture.image.width/texture.image.height;proxyMaterial.map=texture;proxyMaterial.needsUpdate=true;proxy.scale.set(definition.width,definition.width/aspect,1);proxy.position.set(0,.02,0)}
    function setView(name){Object.assign(runtime,views[name]);document.querySelectorAll('[data-view]').forEach(button=>button.classList.toggle('active',button.dataset.view===name))}
    document.querySelectorAll('[data-view]').forEach(button=>button.addEventListener('click',()=>setView(button.dataset.view)));
    setView(views[new URLSearchParams(location.search).get('view')]?new URLSearchParams(location.search).get('view'):'hero');
    let dragging=false,lastX=0,lastY=0;
    canvas.addEventListener('pointerdown',event=>{dragging=true;lastX=event.clientX;lastY=event.clientY;canvas.setPointerCapture(event.pointerId)});
    canvas.addEventListener('pointermove',event=>{if(!dragging)return;runtime.yaw+=(event.clientX-lastX)*.0065;runtime.pitch=THREE.MathUtils.clamp(runtime.pitch+(event.clientY-lastY)*.0065,-.5,1.15);lastX=event.clientX;lastY=event.clientY;document.querySelectorAll('[data-view]').forEach(button=>button.classList.remove('active'))});
    canvas.addEventListener('pointerup',()=>dragging=false);canvas.addEventListener('pointercancel',()=>dragging=false);
    canvas.addEventListener('wheel',event=>runtime.distance=THREE.MathUtils.clamp(runtime.distance+event.deltaY*.007,7.3,17),{passive:true});
    const reference=document.querySelector('#reference'),referenceViews=['../assets/references/apex-gt-r-angles.webp','../assets/references/apex-gt-r-orthographic.webp','../assets/references/apex-gt-r-details.webp'];let referenceIndex=0;
    document.querySelector('#compare').addEventListener('click',event=>{reference.classList.toggle('show');event.currentTarget.textContent=reference.classList.contains('show')?'隐藏参考图':'显示参考图'});
    document.querySelector('#next-ref').addEventListener('click',()=>{referenceIndex=(referenceIndex+1)%referenceViews.length;reference.src=referenceViews[referenceIndex];reference.classList.add('show');document.querySelector('#compare').textContent='隐藏参考图'});
    document.querySelector('#projection').addEventListener('click',event=>{runtime.projection=!runtime.projection;event.currentTarget.classList.toggle('active',runtime.projection);event.currentTarget.textContent=runtime.projection?'多视图投影 ON':'纯 3D 结构 ON';document.querySelector('#note-text').textContent=runtime.projection?'多视图投影按相机方向匹配九张去背景参考，可在证据视角保留原始像素细节。':'纯 3D 结构模式：可检查放样车体、轮组、灯组、底盘与空气动力部件的真实层级。';syncProjection()});
    document.querySelector('#spin').addEventListener('click',event=>{runtime.spin=!runtime.spin;event.currentTarget.textContent=runtime.spin?'暂停自转':'开启自转'});
    document.querySelector('#lights').addEventListener('click',()=>{runtime.lights=!runtime.lights;whiteLED.emissiveIntensity=runtime.lights?4.2:.15;redLED.emissiveIntensity=runtime.lights?4:.12;redLED.color.set(runtime.lights?0xff2024:0x4a0809);document.querySelector('#note-text').textContent=runtime.lights?'车灯已开启：前 LED 光刃与贯穿式尾灯按参考图发光。':'车灯已关闭，可检查灯腔、车体反射和碳纤维层次。'});
    addEventListener('message',event=>{if(event.data?.action==='car-lights')document.querySelector('#lights').click();if(event.data?.action==='car-projection')document.querySelector('#projection').click();if(event.data?.action==='spin-toggle')document.querySelector('#spin').click()});
    function resize(){const width=canvas.clientWidth,height=canvas.clientHeight;renderer.setSize(width,height,false);camera.aspect=width/height;camera.updateProjectionMatrix()}addEventListener('resize',resize);resize();
    const clock=new THREE.Clock();function render(){requestAnimationFrame(render);const dt=clock.getDelta();if(runtime.spin&&!dragging)runtime.yaw+=dt*.15;const horizontal=runtime.distance*Math.cos(runtime.pitch);camera.position.set(runtime.target.x+horizontal*Math.sin(runtime.yaw),runtime.target.y+runtime.distance*Math.sin(runtime.pitch),runtime.target.z+horizontal*Math.cos(runtime.yaw));camera.lookAt(runtime.target);if(runtime.spin)for(const wheel of wheels)wheel.rotation.z-=dt*1.6;rearBar.material.emissiveIntensity=runtime.lights?3.6+Math.sin(clock.elapsedTime*2.2)*.18:.12;syncProjection();renderer.render(scene,camera)}render();
  </script>
</body>
